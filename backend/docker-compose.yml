version: '3.4'

services:
  image-service:
    image: ${DOCKER_REGISTRY-}image_service
    build:
      context: .
      dockerfile: ImageService/Dockerfile
    env_file: ImageService/default.env
    environment:
      - rabbit_mq_host=rabbitmq
    ports:
      - "8080:8080"
    depends_on:
      - rabbitmq

  identity-service:
    image: ${DOCKER_REGISTRY-}identity_service
    build:
      context: .
      dockerfile: IdentityService/Dockerfile
    env_file: IdentityService/default.env
    environment:
      - rabbit_mq_host=rabbitmq
    ports:
      - "8081:8081"
    depends_on:
      - rabbitmq

  user-preferences-service:
    image: ${DOCKER_REGISTRY-}user_preferences_service
    build:
      context: .
      dockerfile: UserPreferenceService/Dockerfile
    env_file: UserPreferenceService/default.env
    environment:
      - rabbit_mq_host=rabbitmq
    ports:
      - "8082:8082"
    depends_on:
      - rabbitmq

  next-image-service:
    image: ${DOCKER_REGISTRY-}next_image_service
    build:
      context: .
      dockerfile: NextImageService/Dockerfile
    env_file: NextImageService/default.env
    environment:
      - rabbit_mq_host=rabbitmq
      - user_preference_service_url=http://user-preferences-service:8082
      - image_service_url=http://image-service:8080
    ports:
      - "8084:8084"
    depends_on:
      - rabbitmq

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
